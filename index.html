<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Matrix Official Hub</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#000;
  color:white;
}

/* HEADER */

header{
  background:#111;
  padding:20px;
  border-bottom:2px solid white;
  position:sticky;
  top:0;
  z-index:1000;
}

.top-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:90%;
  margin:auto;
}

header h1{
  font-size:32px;
  letter-spacing:2px;
}

.cart-btn{
  background:white;
  color:black;
  padding:12px 20px;
  border-radius:12px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.cart-btn:hover{
  background:#ccc;
}

/* PRODUCTS */

.container{
  width:90%;
  margin:auto;
  padding:40px 0;
}

.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  background:#111;
  border:2px solid white;
  border-radius:15px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:450px;
  object-fit:contain;
  background:black;
}

.card-content{
  padding:20px;
  text-align:center;
}

.card-content h2{
  margin-bottom:10px;
}

.price{
  color:white;
  font-size:22px;
  margin-bottom:15px;
}

button{
  background:white;
  color:black;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-size:16px;
  transition:0.3s;
  font-weight:bold;
}

button:hover{
  background:#ccc;
}

/* CART */

.side-cart{
  position:fixed;
  top:0;
  right:-420px;
  width:400px;
  height:100vh;
  background:#111;
  border-left:2px solid white;
  padding:20px;
  transition:0.4s;
  z-index:2000;
  overflow-y:auto;
}

.side-cart.active{
  right:0;
}

.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close-btn{
  background:red;
  color:white;
}

.cart-item{
  display:flex;
  justify-content:space-between;
  padding:12px 0;
  border-bottom:1px solid #333;
}

.total{
  margin-top:20px;
  font-size:24px;
}

/* FORM */

form{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input,
textarea,
select{
  padding:12px;
  border:none;
  border-radius:10px;
  background:#222;
  color:white;
  font-size:16px;
}

.payment-box{
  background:#222;
  padding:15px;
  border-radius:10px;
  border:1px solid white;
}

footer{
  margin-top:50px;
  text-align:center;
  padding:20px;
  border-top:2px solid white;
}

@media(max-width:500px){

  .side-cart{
    width:100%;
  }

  header h1{
    font-size:22px;
  }

}

</style>

</head>

<body>

<header>

  <div class="top-header">

    <h1>Matrix Official Hub</h1>

    <div class="cart-btn" onclick="toggleCart()">
      🛒 Cart (<span id="cartCount">0</span>)
    </div>

  </div>

</header>

<div class="container">

  <div class="products" id="products"></div>

</div>

<!-- CART -->

<div class="side-cart" id="sideCart">

  <div class="cart-header">

    <h2>Your Cart</h2>

    <button class="close-btn" onclick="toggleCart()">
      ✕
    </button>

  </div>

  <div id="cartItems"></div>

  <div class="total" id="totalPrice">
    Total: 0৳
  </div>

  <form action="https://formsubmit.co/matrixofficialhub@gmail.com" method="POST">

    <input type="hidden" name="T-Shirt Order" id="tshirtsInput">

    <input type="hidden" name="_subject" value="New T-Shirt Order">

    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="Customer Name" placeholder="Your Name" required>

    <input type="email" name="Customer Email" placeholder="Your Email" required>

    <input type="text" name="Phone Number" placeholder="Phone Number" required>

    <textarea name="Address" placeholder="Delivery Address" required></textarea>

    <select name="Payment Method">

      <option>Cash On Delivery</option>

      <option>bKash</option>

    </select>

    <div class="payment-box">
      bKash Number:
      <strong>01844175037</strong>
    </div>

    <button type="submit">
      Place Order
    </button>

  </form>

</div>

<footer>
  © 2026 Matrix Official Hub
</footer>

<script>

/* PRODUCTS */

const products = [

  {
    name:"T-Shirt 1",
    image:"tshirt1.png",
    price:499
  },

  {
    name:"T-Shirt 2",
    image:"tshirt2.png",
    price:499
  },

  {
    name:"T-Shirt 3",
    image:"tshirt3.png",
    price:499
  },

  {
    name:"T-Shirt 4",
    image:"tshirt4.png",
    price:499
  },

  {
    name:"T-Shirt 5",
    image:"tshirt5.png",
    price:499
  },

  {
    name:"T-Shirt 6",
    image:"tshirt6.png",
    price:499
  },

  {
    name:"T-Shirt 7",
    image:"tshirt7.png",
    price:499
  }

];

const productsContainer =
document.getElementById("products");

const cartItems =
document.getElementById("cartItems");

const totalPrice =
document.getElementById("totalPrice");

/* LOCAL STORAGE CART */

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

/* RENDER PRODUCTS */

function renderProducts(){

  products.forEach((product,index)=>{

    const card =
    document.createElement("div");

    card.classList.add("card");

    card.innerHTML = `

      <img src="${product.image}" alt="${product.name}">

      <div class="card-content">

        <h2>${product.name}</h2>

        <div class="price">
          ${product.price}৳
        </div>

        <button onclick="goToProduct(${index})">
          View Product
        </button>

      </div>

    `;

    productsContainer.appendChild(card);

  });

}

/* GO PRODUCT PAGE */

function goToProduct(index){

  localStorage.setItem(
    "selectedProduct",
    JSON.stringify(products[index])
  );

  window.location.href = "product.html";

}

/* CART TOGGLE */

function toggleCart(){

  document
  .getElementById("sideCart")
  .classList
  .toggle("active");

}

/* UPDATE CART */

function updateCart(){

  cartItems.innerHTML = "";

  let total = 0;

  let tshirtNames = [];

  document.getElementById("cartCount")
  .innerText = cart.length;

  cart.forEach((item)=>{

    total += item.price;

    tshirtNames.push(
      `${item.name} (${item.size})`
    );

    const div =
    document.createElement("div");

    div.classList.add("cart-item");

    div.innerHTML = `

      <span>
        ${item.name} (${item.size})
      </span>

      <span>
        ${item.price}৳
      </span>

    `;

    cartItems.appendChild(div);

  });

  totalPrice.innerText =
  `Total: ${total}৳`;

  document.getElementById("tshirtsInput")
  .value = tshirtNames.join(", ");

}

renderProducts();

updateCart();

</script>

</body>
</html>
