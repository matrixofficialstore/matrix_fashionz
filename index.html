<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Matrix Official Hub</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0d0d0d;
      color:white;
    }

    header{
      background:#5a0000;
      padding:20px;
      text-align:center;
      border-bottom:2px solid white;
    }

    header h1{
      font-size:35px;
    }

    .container{
      width:90%;
      margin:auto;
      padding:40px 0;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:25px;
    }

    .card{
      background:#181818;
      border:2px solid #7a0000;
      border-radius:15px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.03);
      border-color:white;
    }

    .card img{
      width:100%;
      height:320px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
      text-align:center;
    }

    .card-content h2{
      margin-bottom:10px;
    }

    .price{
      color:#ff4d4d;
      font-size:22px;
      margin-bottom:15px;
    }

    button{
      background:#7a0000;
      color:white;
      border:none;
      padding:12px 20px;
      border-radius:10px;
      cursor:pointer;
      font-size:16px;
      transition:0.3s;
    }

    button:hover{
      background:white;
      color:#7a0000;
    }

    .cart{
      margin-top:50px;
      background:#181818;
      border:2px solid #7a0000;
      border-radius:15px;
      padding:25px;
    }

    .cart h2{
      margin-bottom:20px;
    }

    .cart-item{
      display:flex;
      justify-content:space-between;
      padding:10px 0;
      border-bottom:1px solid #333;
    }

    .total{
      margin-top:20px;
      font-size:24px;
      color:#ff4d4d;
    }

    form{
      margin-top:30px;
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    input,
    textarea,
    select{
      padding:12px;
      border:none;
      border-radius:10px;
      background:#2a2a2a;
      color:white;
      font-size:16px;
    }

    .payment-box{
      background:#2a2a2a;
      padding:15px;
      border-radius:10px;
      border:1px solid #7a0000;
    }

    footer{
      margin-top:50px;
      text-align:center;
      padding:20px;
      border-top:2px solid #7a0000;
    }

  </style>
</head>

<body>

<header>
  <h1>Matrix Official Hub</h1>
</header>

<div class="container">

  <div class="products" id="products"></div>

  <div class="cart">

    <h2>Shopping Cart</h2>

    <div id="cartItems"></div>

    <div class="total" id="totalPrice">
      Total: 0৳
    </div>

    <form id="orderForm">

      <input type="text" id="name" placeholder="Your Name" required>

      <input type="email" id="email" placeholder="Your Email" required>

      <input type="text" id="phone" placeholder="Phone Number" required>

      <textarea id="address" placeholder="Delivery Address" required></textarea>

      <select id="paymentMethod">
        <option value="Cash On Delivery">
          Cash On Delivery
        </option>

        <option value="bKash">
          bKash
        </option>
      </select>

      <div class="payment-box">
        bKash Number:
        <strong>01844175037</strong>
      </div>

      <button type="submit">
        Place Order
      </button>

    </form>

  </div>

</div>

<footer>
  © 2026 Matrix Official Hub
</footer>

<script>

const products = [

  {
    name:"T-Shirt 1",
    image:"tshirt1.png",
    price:499
  },

  {
    name:"T-Shirt 2",
    image:"tshirt2.png",
    price:499
  },

  {
    name:"T-Shirt 3",
    image:"tshirt3.png",
    price:499
  },

  {
    name:"T-Shirt 4",
    image:"tshirt4.png",
    price:499
  },

  {
    name:"T-Shirt 5",
    image:"tshirt5.png",
    price:499
  },

  {
    name:"T-Shirt 6",
    image:"tshirt6.png",
    price:499
  },

  {
    name:"T-Shirt 7",
    image:"tshirt7.png",
    price:499
  }

];

const productsContainer = document.getElementById("products");
const cartItems = document.getElementById("cartItems");
const totalPrice = document.getElementById("totalPrice");

let cart = [];

function renderProducts(){

  products.forEach((product,index)=>{

    const card = document.createElement("div");

    card.classList.add("card");

    card.innerHTML = `
      <img src="${product.image}" alt="${product.name}">

      <div class="card-content">

        <h2>${product.name}</h2>

        <div class="price">
          ${product.price}৳
        </div>

        <button onclick="addToCart(${index})">
          Add To Cart
        </button>

      </div>
    `;

    productsContainer.appendChild(card);

  });

}

function addToCart(index){

  cart.push(products[index]);

  updateCart();

}

function updateCart(){

  cartItems.innerHTML = "";

  let total = 0;

  cart.forEach((item)=>{

    total += item.price;

    const div = document.createElement("div");

    div.classList.add("cart-item");

    div.innerHTML = `
      <span>${item.name}</span>
      <span>${item.price}৳</span>
    `;

    cartItems.appendChild(div);

  });

  totalPrice.innerText = `Total: ${total}৳`;

}

document.getElementById("orderForm").addEventListener("submit", async (e)=>{

  e.preventDefault();

  if(cart.length === 0){

    alert("Your cart is empty.");

    return;

  }

  const orderData = {

    name: document.getElementById("name").value,

    email: document.getElementById("email").value,

    phone: document.getElementById("phone").value,

    address: document.getElementById("address").value,

    paymentMethod: document.getElementById("paymentMethod").value,

    cart: cart

  };

  try {

    const response = await fetch("http://localhost:3000/order",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify(orderData)

    });

    const data = await response.json();

    alert(data.message);

    cart = [];

    updateCart();

    document.getElementById("orderForm").reset();

  } catch(error){

    console.log(error);

    alert("Server is not running.");

  }

});

renderProducts();

</script>

</body>
</html>
