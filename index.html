<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matrix Fashion</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Segoe UI,sans-serif;
  background:#f5f5f5;
}

/* HEADER */
header{
  background:#000;
  color:white;
  padding:15px 25px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  letter-spacing:2px;
}

/* PRODUCTS */
.container{
  padding:25px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

.product{
  background:white;
  border-radius:15px;
  padding:15px;
  text-align:center;
  transition:0.2s;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product:hover{
  transform:translateY(-5px);
}

.product img{
  width:100%;
  height:240px;
  object-fit:contain;
}

.product h3{
  margin:10px 0;
}

.product p{
  font-weight:bold;
  font-size:18px;
}

button{
  border:none;
  background:black;
  color:white;
  padding:10px 15px;
  margin-top:10px;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#333;
}

/* CART */
.cart,
.form{
  background:white;
  margin:25px;
  padding:20px;
  border-radius:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.cart-item{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin:10px 0;
  border-bottom:1px solid #ddd;
  padding-bottom:10px;
}

.qty{
  display:flex;
  align-items:center;
  gap:10px;
}

.qty button{
  padding:5px 10px;
}

.total{
  margin-top:15px;
  font-size:20px;
  font-weight:bold;
}

/* FORM */
input,
select{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:8px;
}

/* MOBILE */
@media(max-width:600px){
  header{
    flex-direction:column;
    gap:10px;
  }

  .cart-item{
    flex-direction:column;
    gap:10px;
  }
}
</style>
</head>

<body>

<header>
  <h1>Matrix Fashion</h1>
  <div>🛒 Cart: <span id="cartCount">0</span></div>
</header>

<!-- PRODUCTS -->
<div class="container">

  <div class="product">
    <img src="tshirt1.png" alt="">
    <h3>Black Matrix T-Shirt</h3>
    <p>৳499</p>
    <button onclick="addToCart('Black Matrix T-Shirt',499)">
      Add to Cart
    </button>
  </div>

  <div class="product">
    <img src="tshirt2.png" alt="">
    <h3>Bangla Quote T-Shirt</h3>
    <p>৳599</p>
    <button onclick="addToCart('Bangla Quote T-Shirt',599)">
      Add to Cart
    </button>
  </div>

  <div class="product">
    <img src="tshirt3.png" alt="">
    <h3>American Vintage Tee</h3>
    <p>৳650</p>
    <button onclick="addToCart('American Vintage Tee',650)">
      Add to Cart
    </button>
  </div>

  <div class="product">
    <img src="tshirt4.png" alt="">
    <h3>Dank Meme Tee</h3>
    <p>৳550</p>
    <button onclick="addToCart('Dank Meme Tee',550)">
      Add to Cart
    </button>
  </div>

</div>

<!-- CART -->
<div class="cart">
  <h2>Your Cart</h2>

  <div id="cartItems"></div>

  <div class="total">
    Total: ৳<span id="total">0</span>
  </div>
</div>

<!-- ORDER -->
<div class="form">

  <h2>Order Details</h2>

  <input type="text" id="name" placeholder="Your Name">

  <input type="text" id="phone" placeholder="Phone Number">

  <input type="email" id="email" placeholder="Email Address">

  <input type="text" id="address" placeholder="Address">

  <select id="payment">
    <option>bKash</option>
    <option>Nagad</option>
    <option>Cash on Delivery</option>
  </select>

  <button onclick="placeOrder()">
    Checkout
  </button>

</div>

<script>

let cart = [];

function addToCart(name,price){

  const item = cart.find(i => i.name === name);

  if(item){
    item.qty++;
  }else{
    cart.push({
      name,
      price,
      qty:1
    });
  }

  renderCart();
}

function renderCart(){

  const container = document.getElementById("cartItems");

  container.innerHTML = "";

  let total = 0;
  let count = 0;

  cart.forEach((item,index)=>{

    total += item.price * item.qty;
    count += item.qty;

    container.innerHTML += `
      <div class="cart-item">

        <div>
          <strong>${item.name}</strong><br>
          ৳${item.price}
        </div>

        <div class="qty">

          <button onclick="changeQty(${index},-1)">
            -
          </button>

          ${item.qty}

          <button onclick="changeQty(${index},1)">
            +
          </button>

        </div>

        <button onclick="removeItem(${index})">
          ❌
        </button>

      </div>
    `;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("cartCount").innerText = count;
}

function changeQty(index,change){

  cart[index].qty += change;

  if(cart[index].qty <= 0){
    cart.splice(index,1);
  }

  renderCart();
}

function removeItem(index){

  cart.splice(index,1);

  renderCart();
}

function placeOrder(){

  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  const order = {
    name:document.getElementById("name").value,
    phone:document.getElementById("phone").value,
    email:document.getElementById("email").value,
    address:document.getElementById("address").value,
    payment:document.getElementById("payment").value,
    cart:cart
  };

  console.log(order);

  /*
    PAYMENT GATEWAY REDIRECT
    Replace this with your real backend URL
  */

  window.location.href =
  "https://your-payment-gateway.com/pay";

}

</script>

</body>
</html>
