<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Matrix Fashion</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:white;
  color:black;
}

/* HEADER */

header{
  background:black;
  color:white;
  padding:20px;
  position:sticky;
  top:0;
  z-index:1000;
}

.top-header{
  width:90%;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:32px;
  font-weight:bold;
  letter-spacing:2px;
}

.cart-btn{
  background:white;
  color:black;
  padding:12px 20px;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  border:2px solid white;
}

.cart-btn:hover{
  background:#ddd;
}

/* HERO */

.hero{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:40px;
  align-items:center;
}

.hero img{
  width:100%;
  border-radius:20px;
  border:3px solid black;
}

.features{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.feature-box{
  border:2px solid black;
  padding:20px;
  border-radius:15px;
  background:#f5f5f5;
  font-size:18px;
  font-weight:bold;
}

/* CATEGORY */

.category-section{
  width:90%;
  margin:auto;
  margin-top:50px;
}

.category-title{
  font-size:35px;
  margin-bottom:20px;
}

.categories{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
}

.category-btn{
  padding:15px 25px;
  border:none;
  background:black;
  color:white;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
}

.category-btn:hover{
  background:#333;
}

/* PRODUCTS */

.products{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:25px;
}

.card{
  border:2px solid black;
  border-radius:20px;
  overflow:hidden;
  transition:0.3s;
  background:white;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:350px;
  object-fit:contain;
  background:#f5f5f5;
}

.card-content{
  padding:20px;
}

.card-content h2{
  margin-bottom:10px;
}

.price{
  font-size:24px;
  font-weight:bold;
  margin-bottom:15px;
}

.size-box{
  margin-bottom:15px;
}

select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:2px solid black;
  font-size:16px;
}

.buy-btn{
  width:100%;
  padding:14px;
  background:black;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:17px;
  font-weight:bold;
}

.buy-btn:hover{
  background:#333;
}

/* CART */

.side-cart{
  position:fixed;
  top:0;
  right:-420px;
  width:400px;
  height:100vh;
  background:white;
  border-left:3px solid black;
  padding:20px;
  transition:0.4s;
  z-index:2000;
  overflow-y:auto;
}

.side-cart.active{
  right:0;
}

.cart-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.close-btn{
  background:red;
  color:white;
  border:none;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
}

.cart-item{
  border-bottom:1px solid #ccc;
  padding:15px 0;
}

.remove-btn{
  margin-top:10px;
  background:red;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
}

.total{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
}

/* FORM */

form{
  margin-top:30px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

input,
textarea{
  padding:14px;
  border:2px solid black;
  border-radius:10px;
  font-size:16px;
}

.order-btn{
  background:black;
  color:white;
  border:none;
  padding:15px;
  border-radius:12px;
  cursor:pointer;
  font-size:18px;
  font-weight:bold;
}

.payment-box{
  background:#f5f5f5;
  border:2px solid black;
  padding:15px;
  border-radius:12px;
}

footer{
  margin-top:60px;
  background:black;
  color:white;
  text-align:center;
  padding:25px;
}

@media(max-width:800px){

  .hero{
    grid-template-columns:1fr;
  }

}

@media(max-width:500px){

  .side-cart{
    width:100%;
  }

  .logo{
    font-size:24px;
  }

}

</style>
</head>

<body>

<header>

  <div class="top-header">

    <div class="logo">
      Matrix Fashion
    </div>

    <div class="cart-btn" onclick="toggleCart()">
      🛒 Cart (<span id="cartCount">0</span>)
    </div>

  </div>

</header>

<!-- HERO -->

<section class="hero">

  <img src="review.png" alt="Reviews">

  <div class="features">

    <div class="feature-box">
      ✅ Cash On Delivery Available
    </div>

    <div class="feature-box">
      🔥 Premium Quality Products
    </div>

    <div class="feature-box">
      🚚 Fast Delivery All Over Bangladesh
    </div>

    <div class="feature-box">
      💯 Trusted Clothing Brand
    </div>

  </div>

</section>

<!-- CATEGORY -->

<section class="category-section">

  <div class="category-title">
    Choose Category
  </div>

  <div class="categories">

    <button class="category-btn" onclick="showCategory('tshirt')">
      T-Shirts
    </button>

    <button class="category-btn" onclick="showCategory('shirt')">
      Shirts
    </button>

    <button class="category-btn" onclick="showCategory('panjabi')">
      Panjabi
    </button>

  </div>

</section>

<!-- PRODUCTS -->

<div class="products" id="products"></div>

<!-- CART -->

<div class="side-cart" id="sideCart">

  <div class="cart-header">

    <h2>Your Cart</h2>

    <button class="close-btn" onclick="toggleCart()">
      ✕
    </button>

  </div>

  <div id="cartItems"></div>

  <div class="total" id="totalPrice">
    Total: 0৳
  </div>

  <form action="https://formsubmit.co/matrixofficialhub@gmail.com" method="POST">

    <input type="hidden" name="Products" id="productsInput">

    <input type="hidden" name="_captcha" value="false">

    <input type="text" name="Name" placeholder="Your Name" required>

    <input type="email" name="Email" placeholder="Your Email" required>

    <input type="text" name="Phone" placeholder="Phone Number" required>

    <textarea name="Address" placeholder="Delivery Address" required></textarea>

    <div class="payment-box">
      bKash Number: <strong>01844175037</strong>
    </div>

    <button class="order-btn" type="submit">
      Place Order
    </button>

  </form>

</div>

<footer>
  © 2026 Matrix Fashion
</footer>

<script>

/* PRODUCTS */

const allProducts = {

  tshirt:[

    {
      name:"Matrix T-Shirt",
      image:"tshirt1.png",
      price:499
    },

    {
      name:"Poem T-Shirt",
      image:"tshirt2.png",
      price:499
    },

    {
      name:"Ferrari T-Shirt",
      image:"tshirt3.png",
      price:499
    },

    {
      name:"Naksha T-Shirt",
      image:"tshirt4.png",
      price:499
    }

  ],

  shirt:[

    {
      name:"Black Shirt",
      image:"shirt1.png",
      price:799
    },

    {
      name:"White Shirt",
      image:"shirt2.png",
      price:799
    }

  ],

  panjabi:[

    {
      name:"Premium Panjabi",
      image:"panjabi1.png",
      price:999
    }

  ]

};

const productsContainer =
document.getElementById("products");

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

/* SHOW CATEGORY */

function showCategory(category){

  productsContainer.innerHTML = "";

  allProducts[category].forEach((product,index)=>{

    const card =
    document.createElement("div");

    card.classList.add("card");

    card.innerHTML = `

      <img src="${product.image}">

      <div class="card-content">

        <h2>${product.name}</h2>

        <div class="price">
          ${product.price}৳
        </div>

        <div class="size-box">

          <select id="size-${category}-${index}">

            <option>S</option>
            <option>M</option>
            <option>L</option>
            <option>XL</option>

          </select>

        </div>

        <button class="buy-btn"
        onclick="addToCart('${category}',${index})">

          Buy Now

        </button>

      </div>

    `;

    productsContainer.appendChild(card);

  });

}

/* ADD TO CART */

function addToCart(category,index){

  const product =
  allProducts[category][index];

  const size =
  document.getElementById(
    `size-${category}-${index}`
  ).value;

  cart.push({
    name:product.name,
    price:product.price,
    size:size
  });

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCart();

  toggleCart();

}

/* REMOVE ITEM */

function removeItem(index){

  cart.splice(index,1);

  localStorage.setItem(
    "cart",
    JSON.stringify(cart)
  );

  updateCart();

}

/* TOGGLE CART */

function toggleCart(){

  document
  .getElementById("sideCart")
  .classList
  .toggle("active");

}

/* UPDATE CART */

function updateCart(){

  const cartItems =
  document.getElementById("cartItems");

  cartItems.innerHTML = "";

  let total = 0;

  let productNames = [];

  document.getElementById("cartCount")
  .innerText = cart.length;

  cart.forEach((item,index)=>{

    total += item.price;

    productNames.push(
      `${item.name} (${item.size})`
    );

    const div =
    document.createElement("div");

    div.classList.add("cart-item");

    div.innerHTML = `

      <h3>${item.name}</h3>

      <p>Size: ${item.size}</p>

      <p>${item.price}৳</p>

      <button class="remove-btn"
      onclick="removeItem(${index})">

        Remove

      </button>

    `;

    cartItems.appendChild(div);

  });

  document.getElementById("totalPrice")
  .innerText = `Total: ${total}৳`;

  document.getElementById("productsInput")
  .value = productNames.join(", ");

}

/* DEFAULT */

showCategory("tshirt");

updateCart();

</script>

</body>
</html>
