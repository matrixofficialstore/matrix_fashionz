<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Matrix Fashion</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#f5f5f5;
}

/* HEADER */
header{
  background:black;
  color:white;
  padding:20px;
  position:sticky;
  top:0;
  z-index:1000;
}

.top-header{
  width:90%;
  margin:auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo{
  font-size:28px;
  font-weight:bold;
}

.cart-btn{
  background:white;
  color:black;
  padding:10px 15px;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* HERO */
.hero{
  width:90%;
  margin:40px auto;
  display:grid;
  grid-template-columns:1fr 1.2fr 1fr;
  gap:20px;
  align-items:center;
}

.review-image img{
  width:100%;
  border-radius:20px;
}

/* FEATURES */
.feature{
  padding:16px;
  margin-bottom:10px;
  border-radius:14px;
  color:#222;
  font-weight:bold;
  display:flex;
  align-items:center;
  gap:10px;
  background:#ffffff;
  border:1px solid #e6e6e6;
  box-shadow:0 6px 18px rgba(0,0,0,0.08);
  transition:0.3s ease;
}

/* Premium Quality */
.feature:nth-child(1){
  background:#ffffff;
  border-left:5px solid #111;
}

/* Stock Available */
.feature:nth-child(2){
  background:#ffffff;
  border-left:5px solid #555;
}

/* Email Order */
.feature:nth-child(3){
  background:#ffffff;
  border-left:5px solid #888;
}

/* Hover effect */
.feature:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

/* CATEGORY */
.category{
  width:90%;
  margin:20px auto;
}

.category button{
  background:black;
  color:white;
  padding:12px 18px;
  border:none;
  margin:5px;
  border-radius:10px;
  cursor:pointer;
}

/* PRODUCTS */
.products{
  width:90%;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img{
  width:100%;
  height:260px;
  object-fit:contain;
}

.card-content{
  padding:15px;
}

.price{
  font-weight:bold;
  margin:5px 0;
}

.stock{
  color:green;
  font-weight:bold;
}

button.buy{
  width:100%;
  padding:10px;
  background:black;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

/* CART */
.side-cart{
  position:fixed;
  right:-400px;
  top:0;
  width:380px;
  height:100vh;
  background:white;
  padding:20px;
  transition:0.3s;
  overflow:auto;
}

.side-cart.active{
  right:0;
}

input,textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:1px solid #ddd;
}

.order-btn{
  width:100%;
  padding:12px;
  background:black;
  color:white;
  border:none;
  margin-top:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<header>
<div class="top-header">
<div class="logo">Matrix Fashion</div>
<div class="cart-btn" onclick="toggleCart()">
🛒 Cart (<span id="count">0</span>)
</div>
</div>
</header>

<!-- HERO -->
<section class="hero">

<div>
<div class="feature">🚚 Fast Delivery</div>
<div class="feature">💳 Cash on Delivery</div>
<div class="feature">📧 Email Order</div>
</div>

<div class="review-image">
<img src="review.png">
</div>

<div>
<div class="feature">🔥 Premium Quality</div>
<div class="feature">📦 Stock Available</div>
<div class="feature">✅ Trusted Store</div>
</div>

</section>

<!-- CATEGORY -->
<div class="category">

<button onclick="show('tshirt')">T-Shirts</button>
<button onclick="show('shirt')">Shirts</button>
<button onclick="show('panjabi')">Panjabi</button>

</div>

<!-- PRODUCTS -->
<div class="products" id="products"></div>

<!-- CART -->
<div class="side-cart" id="cartBox">

<h2>Your Cart</h2>
<div id="cartItems"></div>

<div id="total"></div>

<form action="https://formsubmit.co/matrixofficialhub@gmail.com"
method="POST" onsubmit="fillOrder()">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Matrix Order">

<input type="hidden" name="Order ID" id="orderId">
<input type="hidden" name="Products" id="productList">

<input type="text" name="Name" placeholder="Name" required>
<input type="email" name="Email" placeholder="Email" required>
<input type="text" name="Phone" placeholder="Phone" required>
<textarea name="Address" placeholder="Address" required></textarea>

<div><b>bKash: 01844175037</b></div>

<button class="order-btn">Place Order</button>

</form>

</div>

<script>

let cart=[];
let current="tshirt";

/* PRODUCTS */
const data={
tshirt:[
{name:"T-Shirt 1",price:399,stock:5,img:"tshirt1.png"},
{name:"T-Shirt 2",price:399,stock:5,img:"tshirt2.png"},
{name:"T-Shirt 3",price:399,stock:5,img:"tshirt3.png"},
{name:"T-Shirt 4",price:450,stock:5,img:"tshirt4.png"},
{name:"T-Shirt 5",price:599,stock:5,img:"tshirt5.png"},
{name:"T-Shirt 6",price:499,stock:5,img:"tshirt6.png"}
],
shirt:[
{name:"Shirt 1",price:799,stock:4,img:"shirt1.png"}
],
panjabi:[
{name:"Panjabi 1",price:999,stock:3,img:"panjabi1.png"}
]
};

/* SHOW PRODUCTS */
function show(cat){

current=cat;

let box=document.getElementById("products");
box.innerHTML="";

data[cat].forEach((p,i)=>{

box.innerHTML+=`
<div class="card">
<img src="${p.img}">
<div class="card-content">
<h3>${p.name}</h3>
<div class="price">${p.price}৳</div>
<div class="stock">Stock: ${p.stock}</div>

<button class="buy"
onclick="add('${cat}',${i})"
${p.stock<=0?"disabled":""}>

Buy Now

</button>

</div>
</div>
`;

});

}

/* ADD CART */
function add(cat,i){

let p=data[cat][i];

if(p.stock<=0){
alert("Out of stock");
return;
}

p.stock--;
cart.push(p);

document.getElementById("count").innerText=cart.length;

updateCart();
show(current);

}

/* CART UPDATE */
function updateCart(){

let html="";
let total=0;

cart.forEach(c=>{
html+=`<p>${c.name} - ${c.price}৳</p>`;
total+=c.price;
});

document.getElementById("cartItems").innerHTML=html;
document.getElementById("total").innerHTML="Total: "+total+"৳";

}

/* CART TOGGLE */
function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

/* ORDER SYSTEM */
function fillOrder(){

document.getElementById("orderId").value="MF-"+Date.now();

document.getElementById("productList").value=
cart.map(c=>c.name+" "+c.price+"৳").join(", ");

}

/* INIT */
show("tshirt");

</script>

</body>
</html>
